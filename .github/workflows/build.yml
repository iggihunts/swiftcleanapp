name: Build DMG

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install ClamAV
        run: |
          brew install clamav
          # Configure freshclam
          cp /opt/homebrew/etc/clamav/freshclam.conf.sample \
             /opt/homebrew/etc/clamav/freshclam.conf
          sed -i '' 's/^Example/#Example/' /opt/homebrew/etc/clamav/freshclam.conf
          # Download virus database
          freshclam || true
          echo "ClamAV version: $(clamscan --version | head -1)"

      - name: Stage ClamAV binaries
        run: |
          mkdir -p bin
          cp /opt/homebrew/bin/clamscan  bin/clamscan
          cp /opt/homebrew/bin/freshclam bin/freshclam
          chmod +x bin/clamscan bin/freshclam
          echo "Staged binaries:"
          ls -lh bin/

      - name: Build app icons from source
        run: |
          # Use committed source icons to build iconset
          ICONSET=assets/icon.iconset
          mkdir -p "$ICONSET"

          for sz in 16 32 64 128 256 512; do
            src="assets/icon-source-${sz}.png"
            [ ! -f "$src" ] && src="assets/icon-source-1024.png"
            sips -z $sz $sz "$src" --out "$ICONSET/icon_${sz}x${sz}.png" 2>/dev/null || cp "$src" "$ICONSET/icon_${sz}x${sz}.png"
            dbl=$((sz*2))
            if [ $dbl -le 1024 ]; then
              src2="assets/icon-source-${dbl}.png"
              [ ! -f "$src2" ] && src2="assets/icon-source-1024.png"
              sips -z $dbl $dbl "$src2" --out "$ICONSET/icon_${sz}x${sz}@2x.png" 2>/dev/null || true
            fi
          done
          sips -z 1024 1024 assets/icon-source-1024.png --out "$ICONSET/icon_512x512@2x.png" 2>/dev/null || true

          iconutil -c icns "$ICONSET" -o assets/icon.icns
          echo "icon.icns: $(ls -lh assets/icon.icns)"

          # Copy source icon for direct use
          cp assets/icon-source-256.png assets/icon-256.png

      - name: Build DMG
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Find DMG
        id: dmg
        run: |
          DMG=$(find dist -name "*.dmg" | head -1)
          echo "path=$DMG" >> $GITHUB_OUTPUT
          echo "Found: $DMG"
          ls -lh "$DMG"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftClean-macOS-dmg
          path: ${{ steps.dmg.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.path }}
          generate_release_notes: true
          body: |
            ## SwiftClean ${{ github.ref_name }}

            ### Install
            1. Download `SwiftClean-*.dmg` below
            2. Double-click → drag **SwiftClean** to **Applications**
            3. Open from Applications — done!

            > **"Unidentified developer" warning?**
            > Right-click SwiftClean.app → Open → Open. Once only.

            ### Features
            - 🧹 Deep system cleaner
            - 🛡 Malware scanner (ClamAV bundled)
            - ⊘ App uninstaller
            - ⚡ System optimizer
            - ◉ Disk analyzer
            - ⌫ Dev project purger
